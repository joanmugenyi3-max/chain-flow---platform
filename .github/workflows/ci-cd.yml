name: ChainFlow CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: chainflow-production
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ── Code Quality ─────────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run type-check

  # ── Unit Tests ───────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chainflow_test
          POSTGRES_PASSWORD: test_secret
          POSTGRES_DB: chainflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://chainflow_test:test_secret@localhost:5432/chainflow_test
        run: pnpm db:migrate
      - name: Run tests
        env:
          DATABASE_URL: postgresql://chainflow_test:test_secret@localhost:5432/chainflow_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_minimum_32_chars!!
          NODE_ENV: test
        run: pnpm test --filter=./services/*
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test --filter=./apps/web
      - run: pnpm build --filter=./apps/web

  test-ai-engine:
    name: AI Engine Tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          cd services/ai-engine
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: |
          cd services/ai-engine
          pytest --cov=src --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: services/ai-engine/coverage.xml

  # ── Security Scanning ────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: chainflow-platform
          path: .
          format: HTML

  # ── Build & Push Docker Images ───────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [quality, test-backend, test-frontend, test-ai-engine]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        service:
          - name: web
            context: .
            dockerfile: apps/web/Dockerfile
          - name: procurement
            context: .
            dockerfile: services/procurement/Dockerfile
          - name: inventory
            context: .
            dockerfile: services/inventory/Dockerfile
          - name: logistics
            context: .
            dockerfile: services/logistics/Dockerfile
          - name: mining
            context: .
            dockerfile: services/mining/Dockerfile
          - name: ai-engine
            context: .
            dockerfile: services/ai-engine/Dockerfile
          - name: saas-core
            context: .
            dockerfile: services/saas-core/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/chainflow-${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/chainflow-${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # ── Deploy to Staging ────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.chainflow.io
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name chainflow-staging --region ${{ env.AWS_REGION }}
      - name: Deploy with Kustomize
        run: |
          cd infra/k8s/overlays/staging
          kustomize edit set image \
            chainflow-web=${{ env.ECR_REGISTRY }}/chainflow-web:${{ github.sha }} \
            chainflow-procurement=${{ env.ECR_REGISTRY }}/chainflow-procurement:${{ github.sha }} \
            chainflow-inventory=${{ env.ECR_REGISTRY }}/chainflow-inventory:${{ github.sha }} \
            chainflow-logistics=${{ env.ECR_REGISTRY }}/chainflow-logistics:${{ github.sha }} \
            chainflow-mining=${{ env.ECR_REGISTRY }}/chainflow-mining:${{ github.sha }} \
            chainflow-ai-engine=${{ env.ECR_REGISTRY }}/chainflow-ai-engine:${{ github.sha }} \
            chainflow-saas-core=${{ env.ECR_REGISTRY }}/chainflow-saas-core:${{ github.sha }}
          kubectl apply -k .
          kubectl rollout status deployment/chainflow-web -n chainflow-staging --timeout=5m
      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://staging.chainflow.io/api/health || exit 1

  # ── Deploy to Production ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://app.chainflow.io
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
      - name: Run DB migrations (production)
        run: |
          kubectl run db-migrate-${{ github.sha }} \
            --image=${{ env.ECR_REGISTRY }}/chainflow-procurement:${{ github.sha }} \
            --restart=Never \
            --namespace=chainflow-production \
            --env="DATABASE_URL=${{ secrets.PRODUCTION_DATABASE_URL }}" \
            --command -- pnpm db:migrate
          kubectl wait --for=condition=complete job/db-migrate-${{ github.sha }} \
            --namespace=chainflow-production --timeout=5m
      - name: Blue/Green deployment
        run: |
          cd infra/k8s/overlays/production
          kustomize edit set image \
            chainflow-web=${{ env.ECR_REGISTRY }}/chainflow-web:${{ github.sha }} \
            chainflow-procurement=${{ env.ECR_REGISTRY }}/chainflow-procurement:${{ github.sha }} \
            chainflow-inventory=${{ env.ECR_REGISTRY }}/chainflow-inventory:${{ github.sha }} \
            chainflow-logistics=${{ env.ECR_REGISTRY }}/chainflow-logistics:${{ github.sha }} \
            chainflow-mining=${{ env.ECR_REGISTRY }}/chainflow-mining:${{ github.sha }} \
            chainflow-ai-engine=${{ env.ECR_REGISTRY }}/chainflow-ai-engine:${{ github.sha }} \
            chainflow-saas-core=${{ env.ECR_REGISTRY }}/chainflow-saas-core:${{ github.sha }}
          kubectl apply -k .
          kubectl rollout status deployment/chainflow-web -n chainflow-production --timeout=10m
      - name: Production health check
        run: |
          sleep 60
          curl -f https://app.chainflow.io/api/health || (kubectl rollout undo deployment --all -n chainflow-production && exit 1)
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '🚨' }} Production deployment ${{ job.status }}: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
